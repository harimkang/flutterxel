name: publish-pub-dev

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (format: vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag and package versions
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          bash ./packages/flutterxel_tools/tool/check_release_versions.sh --tag "$RELEASE_TAG"

  pub-publish:
    needs: release-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: flutterxel
            path: packages/flutterxel
          - package: flutterxel_tools
            path: packages/flutterxel_tools
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Configure pub.dev token
        env:
          PUB_DEV_PUBLISH_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_TOKEN }}
        run: |
          if [[ -z "${PUB_DEV_PUBLISH_TOKEN:-}" ]]; then
            echo "Missing PUB_DEV_PUBLISH_TOKEN secret." >&2
            exit 1
          fi
          dart pub token add https://pub.dev --env-var PUB_DEV_PUBLISH_TOKEN
      - name: Bootstrap workspace
        run: dart run melos bootstrap
      - name: Publish to pub.dev (${{ matrix.package }})
        working-directory: ${{ matrix.path }}
        run: flutter pub publish --force
