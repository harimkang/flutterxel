site_name: flutterxel Docs
site_description: Official documentation for the flutterxel Flutter plugin and runtime.
site_url: https://harimkang.github.io/flutterxel/
repo_url: https://github.com/harimkang/flutterxel
repo_name: harimkang/flutterxel
edit_uri: edit/main/docs/site/

docs_dir: site
site_dir: .site
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

not_in_nav: |
  api/flutterxel/**/*.md

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First App: getting-started/first-app.md
  - Guides:
      - Game Loop and Rendering: guides/game-loop-and-rendering.md
      - Input: guides/input.md
      - Audio: guides/audio.md
      - Resources and Persistence: guides/resources-and-persistence.md
      - Pixel Snap Asset Preprocessing: guides/pixel-snap-asset-preprocessing.md
      - Examples: guides/examples.md
  - Reference:
      - API (Auto-Generated): reference/api.md
      - Constants and Compatibility: reference/constants-and-compatibility.md
      - Licensing and Attribution: reference/licensing-and-attribution.md
  - Release Notes:
      - v0.0.8: release-notes/v0.0.8.md
      - v0.0.7: release-notes/v0.0.7.md
      - v0.0.6: release-notes/v0.0.6.md
      - v0.0.5: release-notes/v0.0.5.md
      - v0.0.4: release-notes/v0.0.4.md
      - v0.0.3: release-notes/v0.0.3.md
      - v0.0.2: release-notes/v0.0.2.md
  - Docs Workflow: contributing.md
